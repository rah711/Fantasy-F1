# ============================================================
# Fantasy F1 2026 — Master Configuration
# ============================================================
# Every manual parameter lives here. Update this file before
# each race weekend — no Python code changes needed.
#
# How to use:
#   1. Before each race: update weather_override, optionally
#      adjust team development_score or regulation_adaptation
#   2. After each race: update current_team, budget, transfers,
#      and regulation.era_weight as the season picture clears
#   3. Supply price threshold tables in data/fantasy/ each week
# ============================================================


# --- Season Setup ---

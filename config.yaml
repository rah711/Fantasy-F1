# --- Model Settings ---
model:
  # "lightgbm" or "xgboost" — swap without changing any code
  engine: "lightgbm"

  # Quantile levels for prediction intervals
  # 0.1 and 0.9 give an 80% prediction interval
  quantiles: [0.1, 0.5, 0.9]

  hyperparameters:
    lightgbm:
      n_estimators: 300
      learning_rate: 0.0111
      max_depth: 4
      num_leaves: 29
      min_child_samples: 7
      subsample: 0.709
      colsample_bytree: 0.861
      reg_alpha: 0.005
      reg_lambda: 0.655

    xgboost:
      n_estimators: 300
      learning_rate: 0.05
      max_depth: 6
      min_child_weight: 10
      subsample: 0.8
      colsample_bytree: 0.8
      reg_alpha: 0.1
      reg_lambda: 0.1


# --- Regulation Uncertainty (2026-specific) ---
# 2026 introduces completely new technical regulations.
# These parameters control how much the model trusts historical data
# vs observed 2026 results.
regulation:
  # era_weight: 0.0 = trust only pre-2026 history, 1.0 = trust only 2026 observed
  # Increase this as the season progresses and the car hierarchy clarifies.
  # Suggested schedule: R1=0.05, R3=0.18, R5=0.40, R8=0.75, R10=0.89
  era_weight: 0.18

  # uncertainty_multiplier: widens prediction intervals to account for the
  # genuinely unknown 2026 car hierarchy. Start at 2.0 (double the normal
  # spread) and reduce toward 1.0 as results clarify (~R8-R10).
  uncertainty_multiplier: 1.6

  # Suggested convergence schedule (for reference — you set era_weight manually):
  # R1: 0.05, R2: 0.10, R3: 0.18, R4: 0.28, R5: 0.40, R6: 0.53
  # R7: 0.65, R8: 0.75, R9: 0.83, R10: 0.89, R11+: asymptote toward 1.0


# --- Optimizer Settings ---
optimizer:
  lookahead_races: 3           # Multi-week planning horizon
  price_appreciation_weight: 0.4  # Strict split tuning (train 2023-2024, one-shot test 2025)
  # "conservative" = minimize downside, "moderate" = balanced, "aggressive" = maximize upside
  risk_tolerance: "moderate"
  initial_team_kpi:
    enabled: true
    num_alternatives: 50       # Feasible (<=100M) alternatives sampled for KPI percentile (daily iteration)
    random_seed: 42


# --- Current Team State (update after each race) ---
# Set this to your actual team after each race weekend.
current_team:
  drivers: ["LAW", "SAI", "GAS", "BEA", "RUS"]
  constructors: ["ferrari", "racing_bulls"]
  drs_boost: "RUS"
  budget: 2.5        # Bank remaining after R3 transfers
  free_transfers: 2  # Standard allowance for next window (R4)
  banked_transfers: 0
  chips_used: []
  chips_remaining:
    - autopilot
    - extra_drs_boost
    - no_negative
    - wildcard
    - limitless
    - final_fix

  # R3 transfer log:
  # Sold: BOR (6.4M), PER (6.4M)
  # Bought: BEA (8.6M), GAS (12.8M)
  # Used 2 of 2 free transfers. No chips played.
  # R4 priority: monitor SAI (expensive for Williams), consider ANT if budget allows


# --- Weather Override (update before each race weekend) ---
# Set the rain probability based on the weather forecast for the weekend.
# 0.0 = definitely dry, 1.0 = definitely wet
weather_override:
  next_race_round: 3
  rain_probability: 0.25
  notes: "JPN R3: Fri dry (3%), Sat qualifying 65% rain (afternoon showers), Sun race 0% dry+clear. Wet qualifying could scramble grid — benefits position-gain scorers if frontrunners slip."


# --- Data Source Settings ---
data:
  kaggle_dir: "data/raw/kaggle"
  tracing_insights_dir: "data/raw/tracing_insights"
  fastf1_cache_dir: "data/cache"
  openf1_base_url: "https://api.openf1.org/v1"
  openf1_rate_limit: 3    # requests per second (free tier)
  historical_start_year: 2018  # How far back to pull training data


# --- Backtest Settings ---
backtest:
  primary_test_year: 2025   # Walk-forward test season
  regulation_proxy_year: 2022  # Secondary test (2022 = last major reg change)
  train_start_year: 2018    # Training data start

  total_rounds: 24
  # Sprint weekends (3 scoring sessions: qualifying + sprint + race)
  sprint_rounds: [2, 6, 7, 11, 14, 18]
  # R2 China, R6 Miami, R7 Canada, R11 Great Britain, R14 Netherlands, R18 Singapore

  # Calendar: round_number -> (name, country, date_range)

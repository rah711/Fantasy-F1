# --- Team Manual Overrides ---
# Update these before each race weekend based on your assessment.
#
# development_score: 1-5 scale
#   1 = team has stopped development / declining
#   2 = below average development pace
#   3 = average / stable
#   4 = above average / actively upgrading
#   5 = rapid development / major upgrade package arriving
#
# regulation_adaptation: how well the team has adapted to 2026 regs
#   "unknown"  = default at season start (widens prediction intervals)
#   "ahead"    = team clearly understood new regs (tighten intervals upward)
#   "behind"   = team is struggling (tighten intervals downward)
#   "volatile" = inconsistent race to race (keep wide intervals)
#
# development_trajectory: accelerating / stable / frozen / declining
#   This is your primary mid-season lever for incorporating real-world
#   intelligence (e.g., freeze Williams if they stop development,
#   set McLaren to accelerating when major upgrade arrives).

# --- Fantasy Scoring Rules (hardcoded from official rules) ---
scoring:
  qualifying:
    # Driver position points
    positions: {1: 10, 2: 9, 3: 8, 4: 7, 5: 6, 6: 5, 7: 4, 8: 3, 9: 2, 10: 1}
    # P11-P20 = 0 (not listed = 0)
    dnf_dsq_penalty: -5   # NC / DSQ / No time set

    # Constructor qualifying bonuses
    constructor:
      neither_q2: -1       # Neither driver reaches Q2
      one_q2: 1            # One driver reaches Q2
      both_q2: 3           # Both drivers reach Q2
      one_q3: 5            # One driver reaches Q3
      both_q3: 10          # Both drivers reach Q3
      dsq_per_driver: -5   # DSQ penalty per driver

  sprint:
    # Driver position points
    positions: {1: 8, 2: 7, 3: 6, 4: 5, 5: 4, 6: 3, 7: 2, 8: 1}
    # P9-P20 = 0
    position_gained: 1     # +1 per position gained from sprint grid
    position_lost: -1      # -1 per position lost from sprint grid
    overtake_bonus: 1      # +1 per overtake made
    fastest_lap: 5         # +5 for fastest lap in sprint
    dnf_dsq_penalty: -10   # DNF or DSQ

    # Constructor sprint: sum of both drivers' sprint scores
    constructor:
      dsq_per_driver: -10

  race:
    # Driver position points
    positions: {1: 25, 2: 18, 3: 15, 4: 12, 5: 10, 6: 8, 7: 6, 8: 4, 9: 2, 10: 1}
    # P11-P20 = 0
    position_gained: 1     # +1 per position gained from race grid
    position_lost: -1      # -1 per position lost from race grid
    overtake_bonus: 1      # +1 per overtake made
    fastest_lap: 10        # +10 for fastest lap
    dotd: 10               # +10 for Driver of the Day
    dnf_dsq_penalty: -20   # DNF or DSQ

    # Constructor race scoring
    constructor:
      # Sum of both drivers' race scores (excluding DOTD)
      dsq_per_driver: -20

      # Pitstop bonus tiers (based on fastest pitstop of the race weekend)
      pitstop_tiers:
        over_3_0s: 0
        2_50_to_2_99s: 2
        2_20_to_2_49s: 5
        2_00_to_2_19s: 10
        under_2_0s: 20
      fastest_pitstop_bonus: 5      # Bonus for having the fastest pitstop
      world_record_bonus: 15        # Sub-1.8s new world record pitstop

  # Important rule notes (encoded in the scoring functions):
  # - Positions gained/lost = race GRID start vs finish (NOT qualifying vs finish)
  # - Pit lane start = treated as last grid position for positions-gained calc
  # - DNF/Not Classified = flat penalty only, no positions-lost on top
  # - Inactive/non-participating drivers also receive the DNF penalty


# --- Fantasy Game Rules ---
fantasy:
  budget: 100.0              # $100M starting budget
  num_drivers: 5             # 5 drivers per team
  num_constructors: 2        # 2 constructors per team
  free_transfers_per_race: 2 # 2 free transfers per race window
  max_banked_transfers: 1    # 1 unused transfer carries over (no accumulation)
  extra_transfer_cost: -10   # Points penalty per extra transfer beyond allowance
  drs_boost_multiplier: 2    # DRS Boost = 2x one driver's full weekend score

  # Chips (one per race max, each usable only once per season)
  chips:
    available_immediately:
      - autopilot          # Retroactively gives DRS Boost to highest-scoring driver
      - extra_drs_boost    # 3x multiplier on one driver (instead of 2x)
      - no_negative        # Floors score at 0 per scoring category (not overall)
    unlocked_after_race_1:
      - wildcard           # Unlimited free transfers for that race window
      - limitless          # Unlimited transfers AND no budget cap (reverts after race)
      - final_fix          # One penalty-free transfer between qualifying end and race start


